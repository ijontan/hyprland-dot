# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

workspace = name:vert, monitor:desc:Samsung Electric Company LF24T35 H4ZRC01526, default:true
workspace = name:vert, layout:scrolling, layoutopt:direction:down

windowrule = float 1, match:class org.kde.polkit-kde-authentication-agent-1
windowrule = float 1, match:class nm-connection-editor|blueman-manager
windowrule = float 1, match:class org.pulseaudio.pavucontrol
windowrule = size 700 500, match:class org.pulseaudio.pavucontrol
windowrule = float 1, match:class minirt_bonus
windowrule = float 1, match:class nwg-look|qt5ct|mpv
windowrule = float 1, match:class onedriver|onedriver-launcher
windowrule = float 1, match:class eog
windowrule = float 1, match:class zoom
windowrule = float 1, match:class rofi
windowrule = float 1, match:class gnome-system-monitor
windowrule = float 1, match:title ^(Calculator)
windowrule = float 1, match:class yad
windowrule = float 1, match:title ^(shader_test)$
windowrule = float 1, match:title ^(Editor)$
windowrule = float 1, match:title ^(Game)$

windowrule = no_blur 1,match:class gamescope
windowrule = fullscreen 1,match:class gamescope
windowrule = workspace 6 silent,match:class ^(gamescope)$
windowrule = pseudo 1,match:class fcitx

windowrule = center 1,match:class ^(pavucontrol) 

windowrule = float 1, workspace 8
windowrule = center 1, workspace 8

windowrule = float 1, match:initial_title (Discord Popout)
windowrule = pin 1, match:initial_title (Discord Popout)
windowrule = size 25% 25%, match:initial_title (Discord Popout)
windowrule = move 100%-w-25 100%-w-25, match:initial_title (Discord Popout)
# windowrule 
windowrule = workspace 1, match:class ^(thunderbird)$
windowrule = workspace 2, match:class ^(firefox)$
windowrule = workspace 4, match:class ^(Slicer)$
windowrule = workspace 2 silent, match:title ^(shader_test)$
windowrule = workspace 2, match:class ^(Firefox-esr)$
windowrule = workspace 2, match:class ^(Microsoft-edge-beta)$ 
# windowrule = workspace 3, match:class ^([Tt]hunar)$
windowrule = workspace 4, match:class ^(com.obsproject.Studio)$
windowrule = workspace 5 silent, match:class ^([Ss]team)$,match:title ^([Ss]team)$
windowrule = workspace 5 silent, match:class ^(lutris)$
windowrule = workspace 6, match:class ^(virt-manager)$
# windowrule = workspace name:vert silent, match:class ^(discord)$
# windowrule = workspace name:vert silent, match:class ^(com.discordapp.Discord)$
# windowrule = workspace name:vert silent, match:class ^([Aa]rm[Cc]ord)$
# windowrule = workspace name:vert silent, match:class ^([Vv]esk[Tt]op)$
windowrule = workspace special:code silent, match:title ^(Editor)$
windowrule = workspace special:code silent, match:title ^(Game)$
windowrule = workspace 7 silent, match:title  ^(web.whatsapp.com_/)$
windowrule = workspace 7 silent, match:title  ^(web.telegram.org_/)$
windowrule = workspace 7 silent, match:class ^(WebCord)$
windowrule = workspace 9 silent, match:class ^([Aa]udacious)$

#opacity (transparent) #enable as desired
# windowrule = opacity 0.9 0.6, match:class ^([Rr]ofi)$
windowrule = opacity 0.9 0.8, match:class ^(vesktop)$
windowrule = opacity 0.9 0.8, match:title ^(WhatsApp Web)$
windowrule = opacity 0.9 0.7, match:class ^(Brave-browser)$
windowrule = opacity 0.95 0.9, match:class ^(com.discordapp.Discord)$
windowrule = opacity 1 0.97, match:class ^(zen)$
windowrule = opacity 0.9 0.7, match:class ^(Brave-browser-dev)$
windowrule = opacity 0.9 0.7, match:class ^(firefox)$
windowrule = opacity 0.9 0.7, match:class ^(Firefox-esr)$
windowrule = opacity 0.9 0.8, match:class ^([Tt]hunar)$
windowrule = opacity 0.8 0.6, match:class ^(pcmanfm-qt)$
windowrule = opacity 0.9 0.7, match:class ^(gedit)$
windowrule = opacity 0.97 override 0.9 override 0.97 override, match:class ^(kitty)$
windowrule = opacity 0.9 override 0.8 override 0.9 override, match:class ^(com.mitchellh.ghostty)$
windowrule = opacity 0.9 0.7, match:class ^(mousepad)$
windowrule = opacity 0.9 0.7, match:class ^(codium-url-handler)$
windowrule = opacity 0.9 0.7, match:class ^(VSCodium)$
windowrule = opacity 0.9 0.7, match:class ^(yad)$
windowrule = opacity 0.9 0.7, match:class ^(com.obsproject.Studio)$
windowrule = opacity 0.9 0.7, match:class ^([Aa]udacious)$
windowrule = immediate 1, match:class ^(osu)$
windowrule = opacity 1.0 0.5, match:initial_title (Discord Popout)


# windowrule = stay_focused 1, match:class ^([Rr]ofi)$
windowrule = stay_focused 1, match:class ^([Ww]ofi)$
# windowrule = forceinput, match:class ^([Rr]ofi)$
# windowrule = forceinput, match:class ^([Ww]ofi)$
# layerrule = unset, match:namespace rofi
layerrule = blur 1, match:namespace logout_dialog

layerrule = blur 1, match:namespace rofi
layerrule = blur 1, match:namespace launcher
layerrule = blur 1, match:namespace wallpaperPicker
layerrule = blur 1, match:namespace quickEdit
# layerrule = xray 1, match:namespace rofi

# eww bar
layerrule = blur 1, match:namespace wswid
layerrule = ignore_alpha 1, match:namespace wswid
layerrule = xray 1, match:namespace wswid

layerrule = blur 1, match:namespace alarm_wid
layerrule = ignore_alpha 1, match:namespace alarm_wid
layerrule = xray 1, match:namespace alarm_wid

layerrule = blur 1, match:namespace windows
layerrule = ignore_alpha 1, match:namespace windows
layerrule = xray 1, match:namespace windows

layerrule = blur 1, match:namespace clock_wid
layerrule = ignore_alpha 1, match:namespace clock_wid
layerrule = xray 1, match:namespace clock_wid

layerrule = blur 1, match:namespace sysinfo
layerrule = xray 1, match:namespace sysinfo
layerrule = ignore_alpha 1, match:namespace sysinfo

layerrule = blur 1, match:namespace music
layerrule = ignore_alpha 1, match:namespace music
layerrule = animation slide, match:namespace music


# layerrule = blur 1, match:namespace waybar
# layerrule = ignore_alpha 1, match:namespace waybar
#
# layerrule = blur 1, match:namespace ewwbar
# layerrule = ignore_alpha 1, match:namespace ewwbar

layerrule = animation none, match:namespace swww-daemon

