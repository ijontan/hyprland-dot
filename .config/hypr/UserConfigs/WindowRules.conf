# Picture-in-a-Picture (PIP) rules: Oddly, some need re-duplication.  This is because the window for
# PIP changes after on first launch, and will not inherant the rules...
windowrule = opacity 0.95 0.75,match:title ^(Picture-in-Picture)$ # for opacity: [focus num] [bg num]
# Interestingly, the opacity rule above doesn't need the reduplication?
windowrule = pin 1, match:title ^(Picture-in-Picture)$ 
#windowrule=pin,match:title ^(Firefox)$ 
windowrule = opacity override 1 override 1 override 1, match:title ^(Picture-in-Picture)$
windowrule = float 1, match:title ^(Picture-in-Picture)$
windowrule = float 1, match:title ^(client)$
#windowrule=float 1, match:title ^(Firefox)$
windowrule = size 25% 25%,match:title ^(Picture-in-Picture)$ 
#windowrule=size 25% 25%,match:title ^(Firefox)$ 
windowrule = move 72% 7%,match:title ^(Picture-in-Picture)$ 
#windowrule=move 72% 7%,match:title ^(Firefox)$ 
